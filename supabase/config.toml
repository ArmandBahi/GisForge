# GisForge — Supabase local development
# https://supabase.com/docs/guides/local-development/cli/config

project_id = "gis-forge"

[api]
enabled = true
port = 54321
schemas = ["public", "administration", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.migrations]
enabled = true

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:4200"
additional_redirect_urls = ["http://localhost:4200"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true

[inbucket]
enabled = true
port = 54324

[realtime]
enabled = true

[edge_runtime]
enabled = false
